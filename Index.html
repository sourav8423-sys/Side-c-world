<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side C World - Sourav Kushwaha</title>
    <style>
        body {
            background-color: black;
            color: gold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            border: 2px solid gold;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .status {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #fff;
        }

        .logic {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        footer {
            margin-top: 50px;
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .vision {
            color: gold;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1># Side C World #</h1>
        
        <div class="status">
            STATUS: <strong>Siddham</strong>
        </div>

        <div class="logic">
            LOGIC: 123456789
        </div>

        <footer>
            Powered by <span class="vision">Sourav Kushwaha Vision</span>
        </footer>
    </div>

</body>
</html>
